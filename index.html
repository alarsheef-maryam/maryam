<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الأرشيف الإلكتروني</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
           apiKey: "AIzaSyATf2kG8fWo-eTFikdrxqEF3ieolYRxerg",
           authDomain: "arsheef-school-d438a.firebaseapp.com",
           projectId: "arsheef-school-d438a",
           storageBucket: "arsheef-school-d438a.firebasestorage.app",
           messagingSenderId: "913923799841",
           appId: "1:913923799841:web:6412bfff0f4ff1699cdc60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        window.loginAsAdmin = function() {
            const email = "mrayam42gm@gmail.com";
            const pass = prompt("أدخل كلمة المرور:");
            signInWithEmailAndPassword(auth, email, pass)
            .then(() => alert("تم تسجيل الدخول بنجاح!"))
            .catch(err => alert("خطأ: " + err.message));
        };

        window.resetMyPassword = function() {
            sendPasswordResetEmail(auth, "mrayam42gm@gmail.com")
            .then(() => alert("تم إرسال رابط إعادة تعيين كلمة المرور إلى إيميلك!"))
            .catch(err => alert("حدث خطأ: " + err.message));
        };

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "mrayam42gm@gmail.com") {
                // إظهار عناصر المسؤول فقط
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('login-box').style.display = 'none';
            }
        });
    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f4f4; padding: 20px; }
        .admin-only { display: none; }
        #login-box { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: #c9973a; color: white; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="login-box">
        <button onclick="loginAsAdmin()">دخول المسؤول</button>
        <button onclick="resetMyPassword()">نسيت كلمة المرور؟</button>
    </div>

    <h1>مرحباً بكم في الأرشيف الإلكتروني</h1>
    <p>هنا يمكنك عرض المحتويات العامة للموقع.</p>

    <div class="admin-only">
        <h2>لوحة تحكم المسؤول</h2>
        <button>إضافة سجل جديد</button>
    </div>

</body>
</html>
