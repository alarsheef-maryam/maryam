<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الأرشيف الإلكتروني</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // -- ضع بياناتك هنا --
        const firebaseConfig = {
           apiKey: "AIzaSyATf2kG8fWo-eTFikdrxqEF3ieolYRxerg",
           authDomain: "arsheef-school-d438a.firebaseapp.com",
           projectId: "arsheef-school-d438a",
           storageBucket: "arsheef-school-d438a.firebasestorage.app",
           messagingSenderId: "913923799841",
           appId: "1:913923799841:web:6412bfff0f4ff1699cdc60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // وظيفة تسجيل الدخول (سيتم استدعاؤها من زر في الصفحة)
        window.loginAsAdmin = function() {
            const email = "mrayam42gm@gmail.com";
            const pass = prompt("أدخل كلمة المرور الخاصة بحساب المسؤول:");
            signInWithEmailAndPassword(auth, email, pass)
            .then(() => alert("تم تسجيل الدخول بنجاح!"))
            .catch(err => alert("خطأ في تسجيل الدخول: " + err.message));
        };

        // التحقق من المسؤول
        onAuthStateChanged(auth, (user) => {
            const adminEmail = "mrayam42gm@gmail.com";
            if (user && user.email === adminEmail) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.getElementById('login-btn').style.display = 'none'; // إخفاء زر الدخول بعد نجاحه
            }
        });
        
        // الدوال الأخرى كما هي...
        window.openAdminSecView = function(sid) {
            document.getElementById('admin-sections-grid').style.display = 'none';
            document.getElementById('admin-sec-view').style.display = 'block';
        };

        window.closeAdminSecView = function() {
            document.getElementById('admin-sections-grid').style.display = 'grid';
            document.getElementById('admin-sec-view').style.display = 'none';
        };
    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f4f4; padding: 20px; }
        .admin-only { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; cursor: pointer; text-align: center; }
        #login-btn { margin-bottom: 20px; background: #c9973a; color: white; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <button id="login-btn" onclick="loginAsAdmin()">دخول المسؤول</button>

    <div id="admin-sections-grid" class="grid">
        <div class="card" onclick="openAdminSecView('s1')"><h3>القسم الأول</h3></div>
        <div class="card" onclick="openAdminSecView('s2')"><h3>القسم الثاني</h3></div>
    </div>

    <div id="admin-sec-view">
        <button onclick="closeAdminSecView()">العودة</button>
        <h2>محتوى القسم</h2>
        <button class="admin-only">إضافة سجل جديد</button>
    </div>

</body>
</html>
